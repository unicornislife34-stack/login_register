
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - L LE JOSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="max-w-md w-full space-y-8 bg-white/20 backdrop-blur-xl rounded-3xl p-10 shadow-2xl border border-white/30">
        <div class="text-center">
            <h2 class="text-4xl font-bold text-white mb-2">L LE JOSE</h2>
            <p class="text-white/80">Employee Portal</p>
        </div>

        <div id="login-form" class="space-y-6">
            <div>
                <label class="block text-white/90 font-medium mb-2">Username</label>
                <input type="text" id="login-username" class="w-full px-4 py-3 rounded-xl border border-white/30 bg-white/10 text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-white/50">
            </div>
            <div>
                <label class="block text-white/90 font-medium mb-2">Password</label>
                <input type="password" id="login-password" class="w-full px-4 py-3 rounded-xl border border-white/30 bg-white/10 text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-white/50">
            </div>
            <button onclick="login()" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:from-blue-600 hover:to-purple-700 transform hover:-translate-y-1 transition-all duration-200">
                Login
            </button>
            <p class="text-center text-white/70">
                Don't have an account? <a onclick="showRegister()" class="text-blue-200 font-semibold cursor-pointer hover:text-blue-100">Register</a>
            </p>
            <div id="login-error" class="hidden p-3 bg-red-500/20 border border-red-500/50 text-red-100 rounded-xl"></div>
        </div>

        <div id="register-form" class="space-y-6 hidden">
            <div>
                <label class="block text-white/90 font-medium mb-2">Full Name</label>
                <input type="text" id="reg-name" class="w-full px-4 py-3 rounded-xl border border-white/30 bg-white/10 text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-white/50">
            </div>
            <div>
                <label class="block text-white/90 font-medium mb-2">Username</label>
                <input type="text" id="reg-username" class="w-full px-4 py-3 rounded-xl border border-white/30 bg-white/10 text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-white/50">
            </div>
            <div>
                <label class="block text-white/90 font-medium mb-2">Password</label>
                <input type="password" id="reg-password" class="w-full px-4 py-3 rounded-xl border border-white/30 bg-white/10 text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-white/50">
            </div>
            <div>
                <label class="block text-white/90 font-medium mb-2">Role</label>
                <select id="reg-role" class="w-full px-4 py-3 rounded-xl border border-white/30 bg-white/10 text-white focus:outline-none focus:ring-2 focus:ring-white/50">
                    <option value="employee">Employee</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button onclick="register()" class="w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:from-emerald-600 hover:to-green-700 transform hover:-translate-y-1 transition-all duration-200">
                Create Account
            </button>
            <p class="text-center text-white/70">
                Have an account? <a onclick="showLogin()" class="text-blue-200 font-semibold cursor-pointer hover:text-blue-100">Login</a>
            </p>
            <div id="reg-error" class="hidden p-3 bg-red-500/20 border border-red-500/50 text-red-100 rounded-xl"></div>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            if (!username || !password) {
                showError('login-error', 'Please fill in all fields');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('login', '1');
                formData.append('username', username);
                formData.append('password', password);

                const response = await fetch('login_register.php', {
                    method: 'POST',
                    body: formData
                });

                if (response.redirected) {
                    window.location.href = response.url;
                    return;
                }

                const result = await response.text();
                if (result.includes('Invalid username or password')) {
                    showError('login-error', 'Invalid username or password!');
                } else {
                    window.location.reload();
                }
            } catch (error) {
                showError('login-error', 'Login failed. Please try again.');
            }
        }

        async function register() {
            const name = document.getElementById('reg-name').value;
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;

            if (!name || !username || !password) {
                showError('reg-error', 'Please fill in all fields');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('register', '1');
                formData.append('name', name);
                formData.append('username', username);
                formData.append('password', password);
                formData.append('role', role);

                const response = await fetch('login_register.php', {
                    method: 'POST',
                    body: formData
                });

                if (response.redirected) {
                    window.location.href = response.url;
                    return;
                }

                const result = await response.text();
                if (result.includes('already registered')) {
                    showError('reg-error', 'Username is already registered!');
                } else {
                    showSuccess('reg-error', 'Registration successful! Please login.');
                    setTimeout(showLogin, 2000);
                }
            } catch (error) {
                showError('reg-error', 'Registration failed. Please try again.');
            }
        }

        function showError(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.classList.remove('hidden');
        }

        function showSuccess(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.classList.remove('hidden');
            el.className = el.className.replace('bg-red', 'bg-green') + ' bg-green-500/20 border-green-500/50 text-green-100';
        }

        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('reg-error')?.classList.add('hidden');
            document.getElementById('login-error')?.classList.add('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('register-form').classList.contains('hidden')) {
                    register();
                } else {
                    login();
                }
            }
        });
    </script>
</body>
</html>
